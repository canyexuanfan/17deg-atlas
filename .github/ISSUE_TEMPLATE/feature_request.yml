name: 功能建议
description: 建议一个面向用户的改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 期望结果
      description: 理想情况下，用户会看到或完成什么？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的方法
      description: 可选；请勿包含敏感信息。
