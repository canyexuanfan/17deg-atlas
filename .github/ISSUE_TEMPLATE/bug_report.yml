name: Bug 报告
description: 报告可复现的功能问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿在公开 Issue 中粘贴密钥、凭据或个人知识内容。
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供最小且不含敏感信息的复现步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Python 版本和 Agent 类型。
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 提交前确认
      options:
        - label: 我已移除密钥、凭据、私有仓库地址和个人知识内容。
          required: true
        - label: 这不是需要私下报告的安全漏洞。
          required: true
